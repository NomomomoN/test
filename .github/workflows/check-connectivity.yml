name: Connectivity + SSH Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Show runner info
        run: |
          echo "Runner info:"
          uname -a
          whoami
          date

      - name: CURL test 1
        run: |
          echo "=== CURL 1 ==="
          curl -v --max-time 20 https://example.com

      - name: CURL test 2
        run: |
          echo "=== CURL 2 ==="
          curl -v --max-time 20 https://api.github.com

      - name: CURL test 3
        run: |
          echo "=== CURL 3 ==="
          curl -v --max-time 20 https://ifconfig.me

      - name: CURL test 4
        run: |
          echo "=== CURL 4 ==="
          curl -v --max-time 20 https://api.ipify.org

      - name: CURL test 5
        run: |
          echo "=== CURL 5 ==="
          curl -v --max-time 20 https://httpbin.org/ip

      - name: CURL test 6
        run: |
          echo "=== CURL 6 ==="
          curl -v --max-time 20 https://api.myip.com

      - name: Install SSH client (usually already installed)
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Test SSH connection (no key, just check handshake)
        run: |
          echo "=== SSH TEST ==="
          ssh -vvv \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            nice@remote-pishgaman.runflare.com -p 32490 "echo SSH_OK && hostname && uptime"
